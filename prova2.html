<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGL Skeleton</title>
    <style>
        body { margin: 0; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <canvas id="glcanvas"></canvas>

    <script>
        // ===== SHADER SOURCES =====
        const vsSource = `
            attribute vec2 aPosition;
            void main() {
                gl_Position = vec4(aPosition, 0.0, 1.0);
            }
        `;

        const fsSource = `
        		//mediump 16 bit
            precision mediump float;
            uniform vec4 uColor;
            void main() {
                gl_FragColor = uColor;
            }
        `;

        // ===== SHADER COMPILATION =====
        function createShader(gl, type, source) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);
            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                console.error('Errore compilazione shader:', gl.getShaderInfoLog(shader));
                return null;
            }
            return shader;
        }

        function createProgram(gl, vsSource, fsSource) {
            const vertexShader = createShader(gl, gl.VERTEX_SHADER, vsSource);
            const fragmentShader = createShader(gl, gl.FRAGMENT_SHADER, fsSource);
            const program = gl.createProgram();
            gl.attachShader(program, vertexShader);
            gl.attachShader(program, fragmentShader);
            gl.linkProgram(program);
            if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
                console.error('Errore linking programma:', gl.getProgramInfoLog(program));
                return null;
            }
            return program;
        }

        // ===== WEBGL SETUP =====
        const canvas = document.getElementById('glcanvas');
        const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');

        if (!gl) {
            alert("WebGL non supportato dal browser!");
        }

        gl.viewport(0, 0, canvas.width, canvas.height);
        gl.clearColor(0.0, 0.0, 0.0, 1.0); // sfondo nero
        gl.clear(gl.COLOR_BUFFER_BIT);

        // ===== CREAZIONE PROGRAMMA =====
        const program = createProgram(gl, vsSource, fsSource);
        gl.useProgram(program);

        // ===== POSIZIONE E COLORE =====
        const positionLocation = gl.getAttribLocation(program, 'aPosition'); 
        const colorLocation = gl.getUniformLocation(program, 'uColor');

        // ===== VERTICES TRIANGOLO =====
        const verticesLeft = new Float32Array([
            -0.9,  0.9, 
             -0.9,   0, 
             0, 0
        ]); 
        
   const squareVertices = new Float32Array([
        // triangolo 1
        0.2, 0.5,
        0.2, 0.1,
        0.6, 0.1,
        // triangolo 2
        0.2, 0.5,
        0.6, 0.1,
        0.6, 0.5
    ]);
				
        // ===== CREAZIONE BUFFER =====
        const bufferLeft = gl.createBuffer(); 
        gl.bindBuffer(gl.ARRAY_BUFFER, bufferLeft); 
        gl.bufferData(gl.ARRAY_BUFFER, verticesLeft, gl.STATIC_DRAW); 

        // ===== COLLEGAMENTO ATTRIBUTO =====
        gl.enableVertexAttribArray(positionLocation); 
        gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0); 

        // ===== SET COLORE TRIANGOLO =====
        gl.uniform4f(colorLocation, 0.5, 0.0, 0.5, 1.0);

        // ===== DRAW =====
        gl.drawArrays(gl.TRIANGLES, 0, 3); 
        
        
        gl.bindBuffer(gl.ARRAY_BUFFER, bufferLeft); 
        gl.bufferData(gl.ARRAY_BUFFER, squareVertices, gl.STATIC_DRAW);
        
        gl.enableVertexAttribArray(positionLocation); 
        gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0,0); 
        
        
        gl.uniform4f(colorLocation,1.0, 0.0, 0.0, 1.0); 
        
        gl.drawArrays(gl.TRIANGLES, 0, 6); 
        
    </script>
</body>
</html>
